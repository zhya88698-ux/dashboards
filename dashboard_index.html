<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>团队数据分析 | 总览仪表盘</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','PingFang SC',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px}
.header{text-align:center;padding:32px 20px;background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:16px;margin-bottom:28px;border:1px solid #334155}
.header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#818cf8,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:#94a3b8;margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.team-card{background:#1e293b;border-radius:14px;padding:22px 18px;border:1px solid #334155;cursor:pointer;transition:transform .2s,box-shadow .2s;text-align:center}
.team-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);border-color:#818cf8}
.team-id{font-size:1.4rem;font-weight:700;color:#818cf8;margin-bottom:10px}
.team-amount{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.team-label{color:#64748b;font-size:.78rem;margin-top:4px}
.team-rows{color:#64748b;font-size:.75rem;margin-top:4px}
.total-bar{background:#1e293b;border-radius:12px;padding:18px 24px;border:1px solid #334155;margin-bottom:28px;display:flex;flex-wrap:wrap;gap:24px;justify-content:center}
.total-item{text-align:center}
.total-val{font-size:1.5rem;font-weight:700;color:#34d399}
.total-lbl{color:#64748b;font-size:.8rem;margin-top:2px}
@media(max-width:500px){.grid{grid-template-columns:1fr 1fr}}
</style></head><body>
<div class="header">
  <div style="font-size:2.5rem;margin-bottom:8px">📊</div>
  <h1>团队数据分析总览</h1>
  <div class="sub">共 3 个团队 | 2026年4月数据 | 点击卡片查看详细仪表盘</div>
</div>
<div class="total-bar">
  <div class="total-item"><div class="total-val">¥64,992.46</div><div class="total-lbl">3个团队总订单金额</div></div>
  <div class="total-item"><div class="total-val">2,753</div><div class="total-lbl">总数据条数</div></div>
</div>
<div class="grid">

  <div class="team-card" onclick="window.location='dashboard_PM3V6.html'">
    <div class="team-id">PM3V6</div>
    <div class="team-amount">¥28,028.62</div>
    <div class="team-label">4月总订单金额</div>
    <div class="team-rows">362 条数据记录</div>
  </div>

  <div class="team-card" onclick="window.location='dashboard_FWV7R.html'">
    <div class="team-id">FWV7R</div>
    <div class="team-amount">¥20,628.30</div>
    <div class="team-label">4月总订单金额</div>
    <div class="team-rows">1,604 条数据记录</div>
  </div>

  <div class="team-card" onclick="window.location='dashboard_D3X5H.html'">
    <div class="team-id">D3X5H</div>
    <div class="team-amount">¥16,335.54</div>
    <div class="team-label">4月总订单金额</div>
    <div class="team-rows">787 条数据记录</div>
  </div>

</div>
<div style="text-align:center;color:#475569;font-size:.8rem;margin-top:32px;padding:16px 0">
  数据来源：各团队4月份整体数据分析表 | 生成时间：2026年5月8日
</div>
</body></html>
